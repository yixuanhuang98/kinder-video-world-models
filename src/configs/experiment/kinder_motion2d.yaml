defaults:
  - default

# Small dataset: 111 episodes x ~42 steps x ~38 slices/ep = ~4200 train clips
# At bs=8, one epoch ~525 steps -> 15k steps ~= 28 epochs
training:
  max_steps: 15000
  batch_size: 16
  val_every_n_steps: 500
  checkpointing:
    across_timesteps:
      every_n_train_steps: 2500
      save_top_k: -1
    latest:
      every_n_train_steps: 500
      save_top_k: 1
